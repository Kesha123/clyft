target-version = "py314"
line-length = 120
extend-exclude = ["package:0.0.0", "podman"]

[lint]
select = [
    "E", "W",  # pycodestyle
    "F",       # pyflakes
    "I",       # isort
    "UP",      # pyupgrade
    "B",       # flake8-bugbear
    "C4",      # flake8-comprehensions
    "SIM",     # flake8-simplify
    "PIE",     # flake8-pie
    "RET",     # flake8-return
    "ARG",     # flake8-unused-arguments
    "RUF",     # ruff-specific
]

[lint.isort]
known-first-party = ["clyft"]
